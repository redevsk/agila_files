<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Barangay Map View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Source+Sans+3:wght@400;500;600;700;900&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");

      :root {
        --teal: #0d9488;
        --teal-dark: #0f766e;
        --teal-deep: #115e59;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --red: #dc2626;
        --red-light: #fef2f2;
        --orange: #f97316;
        --orange-light: #fff7ed;
        --yellow: #d99a00;
        --yellow-light: #fefce8;
        --green: #16a34a;
        --green-light: #f0fdf4;
        --line: #e2e8f0;
        --line-light: #f1f5f9;
        --ink: #0f172a;
        --ink-light: #334155;
        --muted: #64748b;
        --muted-light: #94a3b8;
        --bg: #f1f5f9;
        --white: #ffffff;
        --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.1);
        --radius-sm: 0.5rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.25rem;
        --transition: 150ms ease;
      }

      body {
        font-family: "Source Sans 3", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        margin: 0;
        background: #0c1a2e;
      }

      h1, h2, h3, h4, h5, h6, strong, .font-display {
        font-family: "Libre Baskerville", serif;
        letter-spacing: -0.01em;
      }

      #roleMap {
        width: 100%;
        height: 100%;
      }

      .hex-pin, .trap-pin, .report-pin, .task-pin {
        min-width: 55px;
        padding: 4px 7px;
        border: 2px solid #fff;
        border-radius: 999px;
        color: #fff;
        box-shadow: 0 8px 20px rgba(16, 32, 51, 0.24);
        font-size: 10px;
        font-weight: 800;
        text-align: center;
      }

      .hex-pin.critical, .trap-pin.critical { background: var(--red); }
      .hex-pin.high, .trap-pin.high { background: var(--orange); }
      .hex-pin.moderate, .trap-pin.moderate { background: var(--yellow); }
      .hex-pin.low { background: var(--green); }
      .trap-pin { background: var(--teal); }
      .report-pin { background: #be123c; }
      .task-pin { background: var(--blue); }

      .map-legend {
        display: grid;
        gap: 6px;
        min-width: 180px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow-lg);
        backdrop-filter: blur(8px);
        color: var(--ink);
        font-size: 12px;
      }

      .map-legend strong {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }

      .map-legend span {
        display: flex;
        align-items: center;
        gap: 8px;
        line-height: 1.3;
        color: var(--ink-light);
      }

      .map-legend i {
        width: 16px;
        height: 10px;
        display: inline-block;
        border-radius: 999px;
        flex-shrink: 0;
      }

      .legend-scope { border: 2px dashed var(--teal); }
      .legend-risk { border: 2px solid var(--red); background: rgba(220, 38, 38, 0.15); }
      .legend-trap { background: var(--teal); }
      .legend-report { background: #be123c; }
      .legend-task { background: var(--blue); }
    </style>
  </head>
  <body>
    <div class="flex h-screen w-screen flex-col">
      <header class="flex items-center justify-between bg-[#0c1a2e] px-6 py-3 text-white shadow-lg">
        <div class="flex items-center gap-3">
          <img src="/img/logo.png" alt="HEXA" class="h-9 w-auto" />
          <div>
            <strong class="block text-xl font-display tracking-wide">HEXA</strong>
            <small class="block text-[0.6rem] font-semibold uppercase tracking-[0.22em] text-teal-300/70">Barangay Map View</small>
          </div>
        </div>
        <span class="inline-flex items-center gap-1.5 rounded-full bg-red-50 px-3 py-1 text-[0.75rem] font-bold text-red-700 ring-1 ring-inset ring-red-200">
          <span class="h-1.5 w-1.5 rounded-full bg-red-500"></span>
          Critical active
        </span>
      </header>
      <div class="flex-1" id="roleMap"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      var center = [14.68135, 120.97455];
      var scopeBounds = [
        [14.67765, 120.96965],
        [14.68475, 120.98035],
      ];

      var sentinels = [
        { id: "OVI-A", pos: [14.68065, 120.9748], risk: "critical", eggs: 91, zone: "School drainage" },
        { id: "OVI-A2", pos: [14.68105, 120.9741], risk: "high", eggs: 72, zone: "General Luna" },
        { id: "OVI-A3", pos: [14.6797, 120.97355], risk: "high", eggs: 76, zone: "Sampaguita" },
        { id: "OVI-C1", pos: [14.68255, 120.97245], risk: "moderate", eggs: 49, zone: "Mabini cluster" },
        { id: "OVI-B", pos: [14.68275, 120.9769], risk: "moderate", eggs: 42, zone: "J.P. Rizal" },
        { id: "OVI-D", pos: [14.67925, 120.97675], risk: "low", eggs: 18, zone: "Transmitter site" },
      ];

      var citizenReport = { id: "R-104", pos: [14.68088, 120.97415], label: "Report" };
      var task = { id: "T-22", pos: [14.68105, 120.9744], label: "Inspect" };

      var inspectionPath = [
        [14.6812, 120.97435],
        [14.68195, 120.97438],
        [14.68208, 120.97345],
        [14.68118, 120.9734],
        [14.6811, 120.97415],
        [14.68042, 120.97423],
        [14.67982, 120.97505],
        [14.67995, 120.97642],
        [14.68072, 120.97655],
        [14.68088, 120.97415],
      ];

      var riskColor = { critical: '#dc2626', high: '#f97316', moderate: '#d99a00', low: '#16a34a' };
      var riskLabel = { critical: 'Critical', high: 'High', moderate: 'Mod.', low: 'Low' };

      function icon(html, className) {
        return L.divIcon({
          className: "",
          html: '<div class="' + className + '">' + html + '</div>',
          iconAnchor: [22, 18],
        });
      }

      function addBaseMap() {
        var map = L.map("roleMap", {
          zoomControl: true,
          scrollWheelZoom: true,
        }).setView(center, 16);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(map);
        return map;
      }

      function addLegend(map, rows) {
        var legend = L.control({ position: "bottomleft" });
        legend.onAdd = function () {
          var div = L.DomUtil.create("div", "map-legend");
          div.innerHTML = "<strong>Legend</strong>" + rows.map(function (row) {
            return '<span><i class="' + row.className + '"></i>' + row.label + '</span>';
          }).join("");
          return div;
        };
        legend.addTo(map);
      }

      function addBarangayScope(map) {
        L.rectangle(scopeBounds, {
          color: "#0f766e",
          weight: 3,
          dashArray: "9 7",
          fill: false,
        }).addTo(map);
      }

      function addRiskLayers(map) {
        L.circle([14.68075, 120.97435], { radius: 430, color: "#dc2626", weight: 4, fillColor: "#dc2626", fillOpacity: 0.14 }).addTo(map);
        L.circle([14.68145, 120.97305], { radius: 350, color: "#f97316", weight: 2, fillColor: "#f97316", fillOpacity: 0.08 }).addTo(map);
        L.circle([14.68255, 120.9765], { radius: 390, color: "#d99a00", weight: 2, fillColor: "#d99a00", fillOpacity: 0.07 }).addTo(map);
      }

      function addSentinels(map) {
        sentinels.forEach(function (trap) {
          L.marker(trap.pos, { icon: icon(trap.id + '<br>' + trap.eggs, 'trap-pin ' + trap.risk) })
            .bindPopup('<strong>' + trap.id + '</strong><br>' + trap.zone + '<br>' + trap.eggs + ' eggs counted')
            .addTo(map);
        });
      }

      function barangayView(map) {
        addBarangayScope(map);
        addRiskLayers(map);
        addSentinels(map);
        L.marker(citizenReport.pos, { icon: icon(citizenReport.label, "report-pin") }).addTo(map);
        L.marker(task.pos, { icon: icon(task.label, "task-pin") }).addTo(map);
        L.polyline(inspectionPath, { color: "#7c3aed", weight: 5, opacity: 0.8 }).addTo(map);
        addLegend(map, [
          { className: "legend-scope", label: "Barangay scope" },
          { className: "legend-risk", label: "Risk perimeter" },
          { className: "legend-trap", label: "Smart ovitrap" },
          { className: "legend-report", label: "Citizen report" },
          { className: "legend-task", label: "Inspection task" },
        ]);
        map.fitBounds(scopeBounds, { padding: [28, 28] });
      }

      var map = addBaseMap();
      barangayView(map);
    </script>
  </body>
</html>
